<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Menu MBG MAP</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-outer:   #192f45;
      --bg-main:    #05233f;
      --bg-panel:   rgba(4, 16, 30, 0.94);
      --gold:       #ffcc00;
      --gold-dim:   rgba(255,204,0,0.12);
      --green:      #34c759;
      --red:        #ff3b30;
      --orange:     #ff9500;
      --glass:      rgba(255,255,255,0.06);
      --glass-b:    rgba(255,255,255,0.11);
      --glass-h:    rgba(255,255,255,0.12);
      --fd: 'Rajdhani', sans-serif;
      --fb: 'Nunito', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-outer);
      font-family: var(--fb);
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ─────────────────────────────────────────
       MAIN CARD
    ───────────────────────────────────────── */
    #mainView {
      width: 96%; height: 95%;
      background: var(--bg-main);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      border: 1px solid var(--glass-b);
    }

    /* ─────────────────────────────────────────
       HEADER  — hanya logo + info teks, super clean
    ───────────────────────────────────────── */
    #header {
      width: 100%;
      flex-shrink: 0;
      background: var(--bg-panel);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-bottom: 1px solid var(--glass-b);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      color: white;
      z-index: 20;
      gap: 8px;
      position: relative;
    }

    .logo-box {
      height: 58px; width: 82px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-img {
      max-height: 100%; max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    }

    .header-info {
      flex: 1;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1px;
    }
    #txtDapur {
      font-family: var(--fd);
      font-size: 21px; font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      line-height: 1.15;
    }
    #txtMenu {
      font-size: 12px; font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.4px;
    }
    #txtTgl {
      font-size: 11px; opacity: 0.65;
      font-style: italic; letter-spacing: 0.2px;
    }

    /* Secret admin btn */
    #secretLoginBtn {
      position: absolute; top: 8px; right: 12px;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: transparent; cursor: pointer; border: none;
      z-index: 100; transition: 0.3s;
    }
    #secretLoginBtn:hover {
      background: var(--gold-dim);
      border: 1px solid rgba(255,204,0,0.35);
    }

    /* ─────────────────────────────────────────
       TOP DOCK  — switch menu/galeri — slide dari atas
    ───────────────────────────────────────── */
    #topDock {
      position: absolute;
      top: -80px;
      left: 50%; transform: translateX(-50%);
      background: var(--bg-panel);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--glass-b);
      border-top: none;
      border-radius: 0 0 20px 20px;
      padding: 10px 24px 12px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      transition: top 0.4s cubic-bezier(0.2,0.9,0.2,1);
      white-space: nowrap;
    }
    #topDock.show-top { top: 0; }

    .top-tab {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      border-radius: 12px;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: var(--fb);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: var(--glass);
      color: #888;
      transition: 0.25s;
    }
    .top-tab:hover { color: #ccc; background: var(--glass-h); }
    .top-tab.tab-active {
      background: var(--gold-dim);
      border-color: rgba(255,204,0,0.35);
      color: var(--gold);
    }
    .top-tab-sep {
      width: 1px; height: 28px;
      background: var(--glass-b);
      flex-shrink: 0;
    }

    /* ─────────────────────────────────────────
       CONTENT AREA
    ───────────────────────────────────────── */
    #contentArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─────────────────────────────────────────
       IMG + NAV
    ───────────────────────────────────────── */
    #imgContainer {
      width: 100%; flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    #displayImg {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      transform-origin: center;
      cursor: pointer;
      position: absolute;
      transition: transform 0.1s ease-out;
    }

    /* Floating nav arrows  */
    .nav-arrow {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.38);
      backdrop-filter: blur(8px);
      border: 1px solid var(--glass-b);
      color: white;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 15;
      transition: 0.2s;
      opacity: 0; pointer-events: none;
    }
    #contentArea:hover .nav-arrow { opacity: 1; pointer-events: all; }
    .nav-arrow:hover { background: rgba(255,204,0,0.25); border-color: var(--gold); }
    #navPrev { left: 10px; }
    #navNext { right: 10px; }

    /* Download btn — auto hide */
    #btnDownload {
      position: absolute;
      bottom: 18px; right: 18px;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      color: #000;
      font-weight: 800; font-family: var(--fb); font-size: 12px;
      border: none;
      padding: 10px 20px; border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 50;
      display: flex; align-items: center; gap: 7px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease, transform 0.3s ease;
      transform: translateY(10px);
    }
    #btnDownload.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
    #btnDownload:hover { filter: brightness(1.1); }

    /* Empty state */
    #emptyState {
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      position: absolute;
      width: 100%; height: 100%;
      text-align: center; color: var(--red);
    }
    #emptyPesan {
      font-family: var(--fd);
      font-size: 20px; font-weight: 700;
      background: rgba(0,0,0,0.4);
      padding: 13px 26px;
      border-radius: 14px;
      border: 1px solid rgba(255,59,48,0.3);
      text-transform: uppercase;
      margin-top: 12px;
    }

    #gridContainer {
      width: 100%; height: 100%;
      display: none;
      flex-wrap: wrap;
      justify-content: center; align-content: center;
      gap: 16px;
      position: absolute; top: 0; left: 0;
      padding: 12px;
      overflow-y: auto;
    }
    .grid-card {
      display: flex; flex-direction: column;
      align-items: center;
      background: var(--glass); border: 1px solid var(--glass-b);
      padding: 12px; border-radius: 14px;
      width: calc(33.33% - 16px); max-width: 290px; min-width: 200px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      cursor: pointer; transition: 0.25s;
    }
    .grid-card:hover { background: var(--glass-h); border-color: var(--gold); }
    .grid-item { width: 100%; height: 150px; object-fit: contain; border-radius: 8px; }
    .grid-title { margin-top: 9px; font-family: var(--fd); font-size: 13px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; text-align: center; }
    .grid-date { margin-top: 3px; font-size: 11px; color: #aaa; font-style: italic; text-align: center; }

    /* ─────────────────────────────────────────
       GALERI
    ───────────────────────────────────────── */
    #galeriContainer {
      width: 100%; height: 100%;
      display: none;
      flex-wrap: wrap;
      justify-content: center; align-content: flex-start;
      gap: 16px;
      position: absolute; top: 0; left: 0;
      padding: 18px;
      overflow-y: auto;
      z-index: 5;
    }
    .galeri-card {
      background: var(--glass); border: 1px solid var(--glass-b);
      border-radius: 16px; width: 270px; padding: 13px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.5);
      color: white; transition: 0.25s;
    }
    .galeri-card:hover { border-color: var(--gold); background: var(--glass-h); }
    .galeri-card img { width: 100%; height: 170px; object-fit: cover; border-radius: 10px; margin-bottom: 9px; }
    .galeri-title { font-family: var(--fd); color: var(--gold); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .galeri-desc { font-size: 12px; color: #bbb; margin: 5px 0 7px; line-height: 1.5; }
    .meta-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; font-style: italic; margin-top: 3px; }

    /* ─────────────────────────────────────────
       BOTTOM DOCK — slide dari bawah
    ───────────────────────────────────────── */
    #dock {
      position: fixed;
      bottom: -380px;
      left: 50%; transform: translateX(-50%);
      background: var(--bg-panel);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 22px 22px 0 0;
      border: 1px solid var(--glass-b);
      border-bottom: none;
      transition: bottom 0.42s cubic-bezier(0.2,0.9,0.2,1);
      z-index: 1000;
      color: white;
      width: max-content; max-width: 99vw;
      box-shadow: 0 -12px 40px rgba(0,0,0,0.9);
      overflow: hidden;
    }
    #dock.show-dock { bottom: 0; }

    /* Slideshow pill — sits on top edge of dock, always part of dock */
    #slidePill {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 9px 22px;
      background: rgba(0,0,0,0.45);
      border-bottom: 1px solid var(--glass-b);
    }
    .pill-btn {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--glass);
      border: 1px solid var(--glass-b);
      color: white;
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer; transition: 0.2s;
    }
    .pill-btn:hover { background: var(--glass-h); border-color: var(--gold); }
    #btnPlayPause {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--green);
      border: none; color: white;
      padding: 8px 20px; border-radius: 20px;
      font-family: var(--fb); font-size: 11px; font-weight: 700;
      cursor: pointer; transition: 0.2s;
    }
    #btnPlayPause.playing { background: var(--red); }
    #btnPlayPause:hover { filter: brightness(1.15); }
    .slide-counter {
      font-size: 11px; color: #666; font-style: italic; min-width: 38px; text-align: center;
    }

    /* Mode switch */
    .dock-inner { padding: 12px 22px 16px; }

    .mode-switch {
      display: flex;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      padding: 3px; width: fit-content;
      gap: 2px; margin: 0 auto 13px;
    }
    .mode-btn {
      background: transparent; color: #666;
      padding: 7px 14px; border-radius: 8px; border: none;
      cursor: pointer;
      font-family: var(--fb); font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: 0.22s;
      display: flex; align-items: center; gap: 5px;
    }
    .mode-btn.active { background: #1a6bbf; color: white; }
    .mode-btn.play-active { background: var(--red); color: white; }

    .dock-row {
      display: flex; gap: 11px;
      align-items: flex-end; flex-wrap: wrap;
    }
    .dock-group { display: flex; flex-direction: column; gap: 4px; }

    label {
      font-size: 9px; opacity: 0.45;
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: white;
    }

    select, input[type="text"], input[type="date"] {
      background: rgba(255,255,255,0.07);
      color: white;
      border: 1px solid var(--glass-b);
      border-radius: 8px;
      padding: 8px 10px;
      font-family: var(--fb); font-size: 12px;
      outline: none;
    }
    select option { background: #0a2040; }
    input[type="file"] {
      background: rgba(255,255,255,0.05);
      color: #ccc;
      border: 1px dashed var(--glass-b);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: var(--fb); font-size: 11px;
      outline: none; cursor: pointer;
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

    button {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: #1a6bbf; color: white;
      border: none; border-radius: 8px;
      padding: 8px 13px;
      font-family: var(--fb); font-size: 11px; font-weight: 700;
      cursor: pointer; transition: 0.2s;
      white-space: nowrap;
    }
    button:hover { filter: brightness(1.2); transform: translateY(-1px); }
    .btn-action  { background: var(--green); }
    .btn-nav     { background: var(--orange); }
    .btn-danger  { background: var(--red); }
    .btn-dark    { background: #213e58; border: 1px solid var(--glass-b); }
    .btn-secondary { background: #444; }
    .kelola-only { display: none; }

    /* Upload panels */
    #uploadSection {
      display: none;
      flex-direction: column;
      gap: 9px;
      margin-top: 10px;
    }
    .up-panel {
      display: flex; flex-wrap: wrap;
      gap: 9px; align-items: flex-end;
      padding: 9px 12px 11px;
      border-radius: 12px;
      border: 1px solid var(--glass-b);
      background: rgba(255,255,255,0.025);
    }
    .up-panel-menu   { border-left: 2px solid var(--green); }
    .up-panel-galeri { border-left: 2px solid var(--orange); }
    .up-badge {
      font-family: var(--fd);
      font-size: 9px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 6px;
      display: block; width: 100%; margin-bottom: 4px;
    }
    .up-badge-menu   { background: rgba(52,199,89,0.15); color: var(--green); border: 1px solid rgba(52,199,89,0.25); }
    .up-badge-galeri { background: rgba(255,149,0,0.15); color: var(--orange); border: 1px solid rgba(255,149,0,0.25); }

    /* Filter row */
    #areaFilter { display: none; margin-bottom: 10px; }

    /* ─────────────────────────────────────────
       WELCOME
    ───────────────────────────────────────── */
    #welcomeScreen {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg-main);
      z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      transition: opacity 1s ease-out;
    }
    .welcome-logo {
      width: 155px;
      animation: pulse 1.6s infinite alternate;
      filter: drop-shadow(0 0 14px rgba(255,204,0,0.4));
    }
    @keyframes pulse { 100% { filter: drop-shadow(0 0 28px rgba(0,234,255,0.75)); transform: scale(1.06); } }

    /* ─────────────────────────────────────────
       MODAL
    ───────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(9px);
      z-index: 10001;
      justify-content: center; align-items: center;
    }
    .modal-box {
      background: rgba(8,20,40,0.96);
      border: 1px solid var(--glass-b);
      border-radius: 22px;
      padding: 26px; width: 320px;
      text-align: center; color: white;
      display: flex; flex-direction: column; gap: 13px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.85);
    }
    .modal-box h3 { color: var(--gold); font-family: var(--fd); font-size: 21px; letter-spacing: 1px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
    .modal-actions button { flex: 1; padding: 11px; font-size: 13px; }

    /* ─────────────────────────────────────────
       LOADER & TOAST
    ───────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    #loaderFloat, #toast {
      visibility: hidden; opacity: 0;
      position: fixed; transition: all 0.3s ease;
      z-index: 10005;
    }
    #loaderFloat {
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(6,18,34,0.93);
      backdrop-filter: blur(16px);
      padding: 22px 32px; border-radius: 18px;
      border: 1px solid var(--glass-b);
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }
    #loaderFloat.show { visibility: visible; opacity: 1; }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--gold-dim);
      border-top: 3px solid var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    #loaderMsg { color: white; font-weight: 700; font-size: 12px; }
    #toast {
      background: rgba(52,199,89,0.93);
      color: #fff; padding: 12px 20px;
      border-radius: 12px;
      left: 50%; bottom: 80px;
      transform: translateX(-50%) translateY(16px);
      font-weight: 700; font-size: 13px; white-space: nowrap;
    }
    #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: rgba(255,59,48,0.93); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.13); border-radius: 4px; }

    @media (max-width: 680px) {
      .grid-card { width: calc(50% - 10px); min-width: 130px; }
      .galeri-card { width: 100%; }
      #dock { width: 100%; border-radius: 18px 18px 0 0; }
    }
  </style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">
  <img src="icon.png" class="welcome-logo" alt="Logo MAP">
</div>

<!-- MAIN CARD -->
<div id="mainView">

  <!-- SECRET ADMIN -->
  <button id="secretLoginBtn" onclick="cekStatusLogin()" title="Login Admin"></button>

  <!-- ───── HEADER (clean: hanya logo + info) ───── -->
  <div id="header">
    <div class="logo-box" id="boxLogo1"></div>
    <div class="header-info">
      <div id="txtDapur">PORTAL MENU MBG</div>
      <div id="txtMenu">MENU MAKANAN BERGIZI</div>
      <div id="txtTgl">-</div>
    </div>
    <div class="logo-box" id="boxLogo2"></div>
  </div>

  <!-- ───── TOP DOCK — switch Menu / Galeri ───── -->
  <div id="topDock">
    <button class="top-tab tab-active" id="tabMenu" onclick="switchView('menu')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      MENU MBG
    </button>
    <div class="top-tab-sep"></div>
    <button class="top-tab" id="tabGaleri" onclick="switchView('galeri')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      GALERI KEGIATAN
    </button>
  </div>

  <!-- ───── CONTENT ───── -->
  <div id="contentArea">
    <!-- Float nav -->
    <button class="nav-arrow" id="navPrev" onclick="prevSlide()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-arrow" id="navNext" onclick="nextSlide()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- IMG container -->
    <div id="imgContainer">
      <img id="displayImg" src="" alt="">

      <!-- Download auto-hide -->
      <button id="btnDownload" onclick="downloadPoster()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Unduh Poster Premium
      </button>

      <div id="emptyState">

    <!-- Filter row -->

<!-- ═══════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════ -->
<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx354VV9soGQmEedc9h6ABFuwaArZWaWLGITlkiQ_SIP69aDKLAdKi3XvSgcz39UTQZ/exec";

  let isAdmin = false;
  let imageList = [];
  let currentIdx = 0;
  let isPlaying = false;
  let slideTimer, idleTimerBottom, idleTimerTop, dlHideTimer;
  let isGlobalPlayMode = true;
  let isModeGaleri = false;
  let isDockHovered = false, isTopDockHovered = false;
  let currentView = 'menu'; // 'menu' | 'galeri'

  // ── FORMAT TANGGAL ──────────────────────────
  const HARI  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  function fmtTgl(str) {
    if(!str || str==='-') return '-';
    try {
      const p = str.split('-');
      const d = (p.length===3 && p[0].length===4)
        ? new Date(+p[0], +p[1]-1, +p[2])
        : new Date(str);
      if(isNaN(d)) return str;
      return `${HARI[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')} ${BULAN[d.getMonth()]} ${d.getFullYear()}`;
    } catch(e) { return str; }
  }

  function fmtHariIni() {
    const d = new Date();
    return `${HARI[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')} ${BULAN[d.getMonth()]} ${d.getFullYear()}`;
  }

  // ── API ──────────────────────────────────────
  async function fetchAPI(action, payload={}) {
    try {
      const r = await fetch(GAS_API_URL + "?action=" + action, {
        method: 'POST',
        headers: {'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });
      return await r.json();
    } catch(e) { showToast("Gagal terhubung ke server", true); return null; }
  }

  // ── INIT ─────────────────────────────────────
  window.onload = () => {
    setTimeout(() => {
      document.getElementById('welcomeScreen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('mainView').style.display = 'flex';
        setMode('playglobal');
      }, 1000);
    }, 2500);

    // Logo
    fetchAPI('getLogo',{namaFile:'Logo Yayasan.png'}).then(r => {
      if(r) document.getElementById('boxLogo1').innerHTML = `<img src="${r}" class="logo-img">`;
    });
    fetchAPI('getLogo',{namaFile:'Logo Badan Gizi.png'}).then(r => {
      if(r) document.getElementById('boxLogo2').innerHTML = `<img src="${r}" class="logo-img">`;
    });

    // Dapur list
    fetchAPI('getDaftarDapur').then(r => {
      let h = '<option value="">-- Pilih Dapur --</option>';
      if(r) r.forEach(d => h += `<option value="${d.id}">${d.nama}</option>`);
      document.getElementById('selDapur').innerHTML = h;
    });

    // ─ Sensor aktivitas bottom dock ─
    const dock = document.getElementById('dock');
    const topDock = document.getElementById('topDock');

    window.addEventListener('mousemove', onActivity);
    window.addEventListener('touchstart', onActivity, {passive:true});

    dock.addEventListener('mouseenter', () => isDockHovered = true);
    dock.addEventListener('mouseleave', () => { isDockHovered = false; scheduleHideBottom(); });
    topDock.addEventListener('mouseenter', () => isTopDockHovered = true);
    topDock.addEventListener('mouseleave', () => { isTopDockHovered = false; scheduleHideTop(); });

    // ─ Sensor download button ─
    const ca = document.getElementById('contentArea');
    ca.addEventListener('mousemove', showDl);
    ca.addEventListener('touchstart', showDl, {passive:true});
    ca.addEventListener('mouseleave', scheduleDlHide);
  };

  // ── ACTIVITY / SENSOR ────────────────────────
  function onActivity() {
    showBottomDock();
    showTopDock();
  }

  function showBottomDock() {
    document.getElementById('dock').classList.add('show-dock');
    clearTimeout(idleTimerBottom);
    idleTimerBottom = setTimeout(() => {
      if(!isDockHovered) document.getElementById('dock').classList.remove('show-dock');
    }, 3500);
  }
  function scheduleHideBottom() {
    clearTimeout(idleTimerBottom);
    idleTimerBottom = setTimeout(() => {
      document.getElementById('dock').classList.remove('show-dock');
    }, 1200);
  }

  function showTopDock() {
    document.getElementById('topDock').classList.add('show-top');
    clearTimeout(idleTimerTop);
    idleTimerTop = setTimeout(() => {
      if(!isTopDockHovered) document.getElementById('topDock').classList.remove('show-top');
    }, 3200);
  }
  function scheduleHideTop() {
    clearTimeout(idleTimerTop);
    idleTimerTop = setTimeout(() => {
      document.getElementById('topDock').classList.remove('show-top');
    }, 1200);
  }

  // Download btn sensor
  function showDl() {
    const btn = document.getElementById('btnDownload');
    const img = document.getElementById('displayImg');
    if(!img.src || img.style.display==='none') return;
    btn.classList.add('visible');
    clearTimeout(dlHideTimer);
    dlHideTimer = setTimeout(() => btn.classList.remove('visible'), 2800);
  }
  function scheduleDlHide() {
    clearTimeout(dlHideTimer);
    dlHideTimer = setTimeout(() => document.getElementById('btnDownload').classList.remove('visible'), 900);
  }

  // ── UTILS ────────────────────────────────────
  function showLoader(m) { document.getElementById('loaderMsg').innerText=m; document.getElementById('loaderFloat').classList.add('show'); }
  function hideLoader()  { document.getElementById('loaderFloat').classList.remove('show'); }
  function showToast(m, err=false) {
    const t = document.getElementById('toast');
    t.innerText = m;
    err ? t.classList.add('error') : t.classList.remove('error');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }
  function tutupModal(id) { document.getElementById(id).style.display='none'; }
  function updateCounter() {
    const el = document.getElementById('slideCounter');
    el.innerText = imageList.length > 0 ? `${currentIdx+1}/${imageList.length}` : '';
  }

  // ── TOP DOCK SWITCH (Menu / Galeri) ──────────
  function switchView(view) {
    currentView = view;
    document.getElementById('tabMenu').classList.toggle('tab-active', view==='menu');
    document.getElementById('tabGaleri').classList.toggle('tab-active', view==='galeri');

    if(view==='galeri') {
      muatGaleri();
    } else {
      document.getElementById('galeriContainer').style.display='none';
      document.getElementById('imgContainer').style.display='flex';
      document.getElementById('slidePill').style.display='flex';
      isModeGaleri = false;
      setMode('playglobal');
    }
  }

  // ── AUTH ─────────────────────────────────────
  function cekStatusLogin() {
    if(!isAdmin) document.getElementById('modalLogin').style.display='flex';
    else showToast("Anda sudah login sebagai Admin.");
  }
  async function prosesLogin() {
    const pwd = document.getElementById('inPassword').value;
    showLoader("Mengecek...");
    const r = await fetchAPI('login',{password:pwd});
    hideLoader();
    if(r && r.success) {
      isAdmin = true; tutupModal('modalLogin');
      showToast("Berhasil Login!"); setMode('kelola');
    } else { showToast("Password Salah!", true); }
  }

  // ── MODE ─────────────────────────────────────
  function setMode(mode) {
    if(mode==='kelola' && !isAdmin) { document.getElementById('modalLogin').style.display='flex'; return; }

    ['btnModePlayGlobal','btnModeLihat','btnModeKelola'].forEach(id =>
      document.getElementById(id).className = 'mode-btn'
    );
    const kelolaElems = document.querySelectorAll('.kelola-only');
    const areaFilter  = document.getElementById('areaFilter');
    const uploadSect  = document.getElementById('uploadSection');

    if(mode==='playglobal') {
      document.getElementById('btnModePlayGlobal').classList.add('active','play-active');
      kelolaElems.forEach(el => el.style.display='none');
      areaFilter.style.display = 'none';
      uploadSect.style.display = 'none';
      jalankanPlaySemua();

    } else if(mode==='lihat') {
      document.getElementById('btnModeLihat').classList.add('active');
      kelolaElems.forEach(el => el.style.display='none');
      areaFilter.style.display = 'flex';
      uploadSect.style.display = 'none';
      isGlobalPlayMode = false;

    } else if(mode==='kelola') {
      document.getElementById('btnModeKelola').classList.add('active');
      kelolaElems.forEach(el => el.style.display='flex');
      areaFilter.style.display = 'flex';
      uploadSect.style.display = 'flex';
      isGlobalPlayMode = false;
    }
  }

  // ── PLAY SEMUA HARI INI ──────────────────────
  async function jalankanPlaySemua() {
    isGlobalPlayMode = true; isModeGaleri = false;
    document.getElementById('galeriContainer').style.display='none';
    document.getElementById('imgContainer').style.display='flex';
    document.getElementById('slidePill').style.display='flex';
    document.getElementById('txtDapur').innerText = "MEMUAT...";
    document.getElementById('txtTgl').innerText = fmtHariIni();
    showLoader("Mengambil Menu Hari Ini...");
    const r = await fetchAPI('getSemuaMenuHariIni');
    hideLoader();
    if(r) {
      imageList = r.filter(i => !i.isPlaceholder);
      if(imageList.length > 0) { updateDisplay(0); if(!isPlaying) runSlide(); }
      else {
        document.getElementById('txtMenu').innerText  = "BELUM ADA MENU HARI INI";
        document.getElementById('displayImg').src     = "";
        document.getElementById('txtDapur').innerText = "SEMUA DAPUR";
        document.getElementById('emptyState').style.display = 'flex';
      }
    }
    updateCounter();
  }

  // ── PERIODE & GAMBAR ─────────────────────────
  async function fetchPeriode() {
    const id = document.getElementById('selDapur').value;
    if(!id) return;
    document.getElementById('txtDapur').innerText =
      document.getElementById('selDapur').options[document.getElementById('selDapur').selectedIndex].text;
    showLoader("Memuat Periode...");
    const r = await fetchAPI('getDaftarPeriode',{dapurId:id});
    hideLoader();
    if(r) {
      let h = '<option value="">-- Pilih Periode --</option>';
      r.forEach(p => h += `<option value="${p.id}">${p.nama}</option>`);
      document.getElementById('selPeriode').innerHTML = h;
      document.getElementById('emptyState').style.display = 'none';
    }
  }

  async function bikinPeriodeBaru() {
    const id = document.getElementById('selDapur').value;
    if(!id) return showToast("Pilih Dapur dulu!", true);
    showLoader("Membuat Folder...");
    const r = await fetchAPI('buatPeriodeMingguIni',{dapurId:id});
    hideLoader();
    if(r) { showToast(r.status); fetchPeriode(); }
  }

  async function fetchGambar() {
    const id = document.getElementById('selPeriode').value;
    if(!id) return;
    showLoader("Mengambil Gambar...");
    const r = await fetchAPI('getGambarMenu',{periodeId:id});
    hideLoader();
    if(r) {
      imageList = r;
      if(r.length > 0) updateDisplay(0);
      else { document.getElementById('txtMenu').innerText="BELUM ADA MENU"; document.getElementById('displayImg').src=""; hideGrid(); }
    }
    updateCounter();
  }

  // ── DISPLAY ──────────────────────────────────
  function updateDisplay(idx) {
    if(!imageList[idx]) return;
    hideGrid();
    const img  = document.getElementById('displayImg');
    const data = imageList[idx];
    if(isGlobalPlayMode || data.dapur)
      document.getElementById('txtDapur').innerText = data.dapur || "SEMUA DAPUR";
    document.getElementById('emptyState').style.display = data.isPlaceholder ? 'flex' : 'none';
    img.style.display = data.isPlaceholder ? 'none' : 'block';
    img.src = data.src;
    document.getElementById('txtMenu').innerText = data.nama;
    document.getElementById('txtTgl').innerText  = fmtTgl(data.tanggal);
    currentIdx = idx;
    img.style.transform = 'translate(0,0) scale(1)';
    updateCounter();
  }

  // ── GALERI ───────────────────────────────────
  async function muatGaleri() {
    isModeGaleri = true;
    document.getElementById('imgContainer').style.display  = 'none';
    document.getElementById('slidePill').style.display     = 'none';
    document.getElementById('galeriContainer').style.display = 'flex';
    document.getElementById('txtDapur').innerText = "GALERI KEGIATAN";
    document.getElementById('txtMenu').innerText  = "SEMUA DAPUR";
    document.getElementById('txtTgl').innerText   = fmtHariIni();

    showLoader("Memuat Galeri...");
    const r = await fetchAPI('getGaleri');
    hideLoader();

    let html = '';
    if(r && r.length > 0) {
      r.forEach(g => {
        html += `<div class="galeri-card">
          <img src="${g.src}" loading="lazy">
          <div class="galeri-title">${g.judul}</div>
          <div class="galeri-desc">${g.deskripsi||''}</div>
          <div class="meta-item">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${fmtTgl(g.tanggal)}
          </div>
          <div class="meta-item" style="margin-top:3px;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${g.dapur||'Umum'}
          </div>
        </div>`;
      });
    } else {
      html = `<div style="color:#666;font-style:italic;margin:auto;padding:40px;">Belum ada kegiatan.</div>`;
    }
    document.getElementById('galeriContainer').innerHTML = html;
  }

  // ── UPLOAD ───────────────────────────────────
  function doUploadMenu() {
    const periodeId = document.getElementById('selPeriode').value;
    const nama = document.getElementById('inNama').value.trim();
    const tgl  = document.getElementById('inTglMenu').value;
    const file = document.getElementById('inFileMenu').files[0];
    if(!periodeId) return showToast("Pilih Periode dulu!", true);
    if(!nama)      return showToast("Isi Nama Menu!", true);
    if(!tgl)       return showToast("Isi Tanggal!", true);
    if(!file)      return showToast("Pilih Foto!", true);
    const rd = new FileReader();
    rd.onload = async e => {
      showLoader("MENGUPLOAD MENU...");
      const r = await fetchAPI('uploadMenu',{periodeId, namaMenu:nama, tanggal:tgl, data:e.target.result});
      hideLoader();
      if(r && r.status==='sukses') {
        showToast("Menu berhasil diupload!");
        document.getElementById('inFileMenu').value='';
        document.getElementById('inNama').value='';
        if(!isGlobalPlayMode) fetchGambar();
      } else showToast("Gagal upload menu", true);
    };
    rd.readAsDataURL(file);
  }

  function doUploadGaleri() {
    const dapurEl = document.getElementById('selDapur');
    if(!dapurEl.value) return showToast("Pilih Dapur untuk Galeri!", true);
    const dapurNama = dapurEl.options[dapurEl.selectedIndex].text;
    const tgl   = document.getElementById('inTglGaleri').value;
    const judul = document.getElementById('inJudulGaleri').value.trim();
    const desc  = document.getElementById('inDescGaleri').value.trim();
    const file  = document.getElementById('inFileGaleri').files[0];
    if(!tgl)   return showToast("Isi Tanggal Kegiatan!", true);
    if(!judul) return showToast("Isi Judul Kegiatan!", true);
    if(!file)  return showToast("Pilih Foto!", true);
    const rd = new FileReader();
    rd.onload = async e => {
      showLoader("MENGUPLOAD GALERI...");
      const r = await fetchAPI('uploadGaleri',{dapur:dapurNama, tanggal:tgl, judul, deskripsi:desc, data:e.target.result});
      hideLoader();
      if(r && r.status==='sukses') {
        showToast("Galeri berhasil diupload!");
        document.getElementById('inFileGaleri').value='';
        document.getElementById('inJudulGaleri').value='';
        document.getElementById('inDescGaleri').value='';
      } else showToast("Gagal upload galeri", true);
    };
    rd.readAsDataURL(file);
  }

  // ── EDIT & HAPUS ─────────────────────────────
  function bukaModalEdit() {
    if(imageList.length===0 || isModeGaleri) return showToast("Pilih menu dulu!", true);
    document.getElementById('editNama').value = imageList[currentIdx].nama;
    document.getElementById('editTgl').value  = imageList[currentIdx].tanggal;
    document.getElementById('modalEdit').style.display = 'flex';
  }
  async function executeEdit() {
    const curr = imageList[currentIdx];
    const file = document.getElementById('editFile').files[0];
    tutupModal('modalEdit');
    showLoader("MENYIMPAN...");
    let payload = {id:curr.id, nama:document.getElementById('editNama').value, tanggal:document.getElementById('editTgl').value, fileData:null};
    if(file) {
      const rd = new FileReader();
      rd.onload = async e => { payload.fileData = e.target.result; await kirimEdit(payload); };
      rd.readAsDataURL(file);
    } else await kirimEdit(payload);
  }
  async function kirimEdit(payload) {
    const r = await fetchAPI('editMenu', payload);
    hideLoader();
    if(r && r.success) { showToast("Berhasil disimpan!"); imageList[currentIdx].nama = payload.nama; updateDisplay(currentIdx); }
    else showToast("Gagal menyimpan!", true);
  }
  function doHapus() {
    if(imageList.length===0 || isModeGaleri) return;
    document.getElementById('modalText').innerText = `Yakin hapus "${imageList[currentIdx].nama}"?`;
    document.getElementById('modalConfirm').style.display = 'flex';
  }
  async function executeHapus() {
    tutupModal('modalConfirm');
    showLoader("MENGHAPUS...");
    const r = await fetchAPI('hapusMenu',{fileId:imageList[currentIdx].id});
    hideLoader();
    if(r && r.success) {
      showToast("Berhasil dihapus!");
      imageList.splice(currentIdx,1);
      currentIdx = 0;
      if(imageList.length>0) updateDisplay(0);
      else { document.getElementById('displayImg').src=''; document.getElementById('emptyState').style.display='flex'; }
    } else showToast("Gagal menghapus!", true);
    updateCounter();
  }

  // ── SLIDE ────────────────────────────────────
  function hideGrid() { document.getElementById('gridContainer').style.display='none'; }

  function runSlide() {
    if(isModeGaleri) return;
    isPlaying = !isPlaying;
    const btn   = document.getElementById('btnPlayPause');
    const icon  = document.getElementById('iconPlay');
    const label = document.getElementById('playLabel');
    if(isPlaying) {
      btn.classList.add('playing');
      icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      label.innerText = 'PAUSE';
      slideTimer = setInterval(() => nextSlide(), 5000);
    } else {
      btn.classList.remove('playing');
      icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      label.innerText = 'PLAY SLIDESHOW';
      clearInterval(slideTimer);
    }
  }
  function nextSlide() { if(imageList.length>0) updateDisplay(currentIdx===imageList.length-1 ? 0 : currentIdx+1); }
  function prevSlide() { if(imageList.length>0) updateDisplay(currentIdx===0 ? imageList.length-1 : currentIdx-1); }

  // ── DOWNLOAD POSTER ──────────────────────────
  async function downloadPoster() {
    const imgElem = document.getElementById('displayImg');
    if(!imgElem || !imgElem.src) return alert("Belum ada gambar!");

    const canvas = document.getElementById('posterCanvas');
    const ctx    = canvas.getContext('2d');
    canvas.width = 1080; canvas.height = 1920;

    ctx.fillStyle = "#05233f";
    ctx.fillRect(0,0,1080,1920);

    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.beginPath();
    ctx.moveTo(0,500);
    ctx.quadraticCurveTo(540,300,1080,500);
    ctx.lineTo(1080,1500);
    ctx.quadraticCurveTo(540,1700,0,1500);
    ctx.fill();

    const loadImg = src => new Promise(res => {
      const i = new Image(); i.crossOrigin="Anonymous";
      i.onload = () => res(i); i.src = src;
    });

    const imgMenu = await loadImg(imgElem.src);
    const l1src   = document.getElementById('boxLogo1')?.querySelector('img')?.src;
    const l2src   = document.getElementById('boxLogo2')?.querySelector('img')?.src;
    if(!l1src || !l2src) return alert("Gagal memuat logo!");

    const logo1 = await loadImg(l1src);
    const logo2 = await loadImg(l2src);

    const lw = 160;
    ctx.drawImage(logo1, 80,  80, lw, lw/(logo1.width/logo1.height));
    ctx.drawImage(logo2, 840, 80, lw, lw/(logo2.width/logo2.height));

    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 40;
    ctx.fillStyle = "#fff";
    ctx.fillRect(100,600,880,600);
    ctx.drawImage(imgMenu,120,620,840,560);
    ctx.shadowBlur = 0;

    ctx.textAlign = "center"; ctx.textBaseline = "top";

    ctx.fillStyle = "#ffcc00"; ctx.font = "bold 55px Arial";
    ctx.fillText(document.getElementById('txtDapur')?.innerText||"SPPG", 540, 430);

    function wrapText(ctx, text, x, y, maxW, lh) {
      const words = text.split(' ');
      let line = '', cy = y;
      for(let n=0; n<words.length; n++) {
        const test = line + words[n] + ' ';
        if(ctx.measureText(test).width > maxW && n>0) { ctx.fillText(line,x,cy); line=words[n]+' '; cy+=lh; }
        else line=test;
      }
      ctx.fillText(line,x,cy);
      return cy+lh;
    }

    ctx.fillStyle = "#fff"; ctx.font = "bold 60px Arial";
    const endY = wrapText(ctx, document.getElementById('txtMenu')?.innerText||"Menu MBG", 540, 1320, 900, 80);

    ctx.fillStyle="#ffcc00"; ctx.font="italic 36px Arial";
    ctx.fillText(document.getElementById('txtTgl')?.innerText||fmtHariIni(), 540, endY+28);

    const a = document.createElement('a');
    a.download = "Poster_Premium_MBG.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  }
</script>
