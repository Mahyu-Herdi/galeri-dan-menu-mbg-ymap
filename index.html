<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Menu MBG MAP</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-outer:   #192f45;
      --bg-main:    #05233f;
      --bg-panel:   rgba(4, 16, 30, 0.94);
      --gold:       #ffcc00;
      --gold-dim:   rgba(255,204,0,0.12);
      --green:      #34c759;
      --red:        #ff3b30;
      --orange:     #ff9500;
      --glass:      rgba(255,255,255,0.06);
      --glass-b:    rgba(255,255,255,0.11);
      --glass-h:    rgba(255,255,255,0.12);
      --fd: 'Rajdhani', sans-serif;
      --fb: 'Nunito', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-outer);
      font-family: var(--fb);
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* MAIN CARD */
    #mainView {
      width: 96%;
      height: 95%;
      background: var(--bg-main);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      border: 1px solid var(--glass-b);
    }

    /* HEADER */
    #header {
      width: 100%;
      flex-shrink: 0;
      background: var(--bg-panel);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-bottom: 1px solid var(--glass-b);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      color: white;
      z-index: 20;
      gap: 8px;
      position: relative;
    }
    .logo-box { height: 58px; width: 82px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .logo-img { max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); }
    .header-info { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
    #txtDapur { font-family: var(--fd); font-size: 21px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8); line-height: 1.15; }
    #txtMenu { font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 0.4px; }
    #txtTgl { font-size: 11px; opacity: 0.65; font-style: italic; letter-spacing: 0.2px; }

    /* SECRET LOGIN */
    #secretLoginBtn {
      position: absolute; top: 8px; right: 12px; width: 34px; height: 34px; border-radius: 50%;
      background: transparent; cursor: pointer; border: none; z-index: 100; transition: 0.3s;
    }
    #secretLoginBtn:hover { background: var(--gold-dim); border: 1px solid rgba(255,204,0,0.35); }

    /* SIDE DOCK (Pindah ke kiri) */
    #sideDock {
      position: absolute;
      left: -100px; /* Hide position */
      top: 50%; transform: translateY(-50%);
      background: var(--bg-panel);
      backdrop-filter: blur(28px);
      border: 1px solid var(--glass-b);
      border-left: none;
      border-radius: 0 20px 20px 0;
      padding: 20px 12px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 10px 0 30px rgba(0,0,0,0.7);
      transition: left 0.4s cubic-bezier(0.2,0.9,0.2,1);
    }
    #sideDock.show-side { left: 0; }

    .side-tab {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 12px 10px; border-radius: 12px; border: 1px solid transparent;
      cursor: pointer; font-family: var(--fb); font-size: 10px; font-weight: 700;
      text-transform: uppercase; background: var(--glass); color: #888; transition: 0.25s;
      width: 70px; text-align: center;
    }
    .side-tab:hover { color: #ccc; background: var(--glass-h); }
    .side-tab.tab-active { background: var(--gold-dim); border-color: rgba(255,204,0,0.35); color: var(--gold); }
    .side-tab-sep { width: 40px; height: 1px; background: var(--glass-b); flex-shrink: 0; }

    /* CONTENT AREA */
    #contentArea { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }

    /* IMG CONTROLS */
    #imgContainer { width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
    #displayImg { max-width: 100%; max-height: 100%; object-fit: contain; cursor: pointer; position: absolute; transition: transform 0.1s ease-out; }
    
    .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.38); backdrop-filter: blur(8px); border: 1px solid var(--glass-b);
      color: white; width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 15;
      transition: 0.2s; opacity: 0; pointer-events: none;
    }
    #contentArea:hover .nav-arrow { opacity: 1; pointer-events: all; }
    .nav-arrow:hover { background: rgba(255,204,0,0.25); border-color: var(--gold); }
    #navPrev { left: 40px; } /* geser dikit agar tidak tertutup side dock */
    #navNext { right: 10px; }

    /* DOWNLOAD BTN */
    #btnDownload {
      position: absolute; bottom: 18px; right: 18px;
      background: linear-gradient(135deg, var(--gold), var(--orange)); color: #000;
      font-weight: 800; font-family: var(--fb); font-size: 12px; border: none;
      padding: 10px 20px; border-radius: 20px; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 50; display: flex; align-items: center; gap: 7px; opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease, transform 0.3s ease; transform: translateY(10px);
    }
    #btnDownload.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
    #btnDownload:hover { filter: brightness(1.1); }

    /* EMPTY STATE */
    #emptyState { display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; width: 100%; height: 100%; text-align: center; color: var(--red); }
    #emptyPesan { font-family: var(--fd); font-size: 20px; font-weight: 700; background: rgba(0,0,0,0.4); padding: 13px 26px; border-radius: 14px; border: 1px solid rgba(255,59,48,0.3); text-transform: uppercase; margin-top: 12px; }

    #gridContainer { width: 100%; height: 100%; display: none; flex-wrap: wrap; justify-content: center; align-content: center; gap: 16px; position: absolute; top: 0; left: 0; padding: 12px; overflow-y: auto; }
    
    /* GALERI */
    #galeriContainer {
      width: 100%; height: 100%; display: none; flex-wrap: wrap; justify-content: center; align-content: flex-start;
      gap: 16px; position: absolute; top: 0; left: 0; padding: 18px; padding-left: 80px; overflow-y: auto; z-index: 5;
    }
    .galeri-card { background: var(--glass); border: 1px solid var(--glass-b); border-radius: 16px; width: 270px; padding: 13px; box-shadow: 0 10px 24px rgba(0,0,0,0.5); color: white; transition: 0.25s; }
    .galeri-card:hover { border-color: var(--gold); background: var(--glass-h); }
    .galeri-card img { width: 100%; height: 170px; object-fit: cover; border-radius: 10px; margin-bottom: 9px; }
    .galeri-title { font-family: var(--fd); color: var(--gold); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .galeri-desc { font-size: 12px; color: #bbb; margin: 5px 0 7px; line-height: 1.5; }
    .meta-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; font-style: italic; margin-top: 3px; }

    /* BOTTOM DOCK */
    #dock {
      position: fixed; bottom: -380px; left: 50%; transform: translateX(-50%);
      background: var(--bg-panel); backdrop-filter: blur(30px); border-radius: 22px 22px 0 0;
      border: 1px solid var(--glass-b); border-bottom: none; transition: bottom 0.42s cubic-bezier(0.2,0.9,0.2,1);
      z-index: 1000; color: white; width: max-content; max-width: 99vw; box-shadow: 0 -12px 40px rgba(0,0,0,0.9); overflow: hidden;
    }
    #dock.show-dock { bottom: 0; }

    /* Dock Controls (Rapih dan Terintegrasi) */
    .dock-controls {
      display: flex; justify-content: center; align-items: center; gap: 15px;
      padding: 12px 22px; border-bottom: 1px solid var(--glass-b); background: rgba(0,0,0,0.3);
    }
    
    .dock-inner { padding: 15px 22px 20px; display: flex; flex-direction: column; align-items: center; gap: 15px;}

    .mode-switch { display: flex; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 4px; gap: 4px; }
    .mode-btn { background: transparent; color: #666; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--fb); font-size: 11px; font-weight: 700; text-transform: uppercase; transition: 0.22s; display: flex; align-items: center; gap: 6px; }
    .mode-btn.active { background: #1a6bbf; color: white; }
    .mode-btn.play-active { background: var(--red); color: white; }

    /* Filter Rows */
    .dock-view-section { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
    .dock-group { display: flex; flex-direction: column; gap: 5px; }

    label { font-size: 10px; opacity: 0.6; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: white; }
    select, input[type="text"], input[type="date"], input[type="month"] { background: rgba(255,255,255,0.07); color: white; border: 1px solid var(--glass-b); border-radius: 8px; padding: 9px 12px; font-family: var(--fb); font-size: 12px; outline: none; }
    select option { background: #0a2040; }
    input[type="file"] { background: rgba(255,255,255,0.05); color: #ccc; border: 1px dashed var(--glass-b); border-radius: 8px; padding: 7px 12px; font-family: var(--fb); font-size: 11px; outline: none; cursor: pointer; }
    input[type="date"]::-webkit-calendar-picker-indicator, input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

    button.btn-base { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: #1a6bbf; color: white; border: none; border-radius: 8px; padding: 9px 15px; font-family: var(--fb); font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; white-space: nowrap; }
    button.btn-base:hover { filter: brightness(1.2); transform: translateY(-1px); }
    .btn-action  { background: var(--green); }
    .btn-nav     { background: var(--orange); }
    .btn-danger  { background: var(--red); }
    .btn-dark    { background: #213e58; border: 1px solid var(--glass-b); }
    .btn-secondary { background: #444; }
    
    .pill-btn { display: inline-flex; align-items: center; justify-content: center; background: var(--glass); border: 1px solid var(--glass-b); color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
    .pill-btn:hover { background: var(--glass-h); border-color: var(--gold); }
    
    #btnPlayPause { display: inline-flex; align-items: center; gap: 7px; background: var(--green); border: none; color: white; padding: 9px 24px; border-radius: 20px; font-family: var(--fb); font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    #btnPlayPause.playing { background: var(--red); }
    #btnPlayPause:hover { filter: brightness(1.15); }
    .slide-counter { font-size: 12px; color: #888; font-style: italic; min-width: 40px; text-align: center; font-weight: bold;}

    .kelola-only { display: none; }

    /* WELCOME SCREEN */
    #welcomeScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 1s ease-out; }
    .welcome-logo { width: 155px; animation: pulse 1.6s infinite alternate; filter: drop-shadow(0 0 14px rgba(255,204,0,0.4)); }
    @keyframes pulse { 100% { filter: drop-shadow(0 0 28px rgba(0,234,255,0.75)); transform: scale(1.06); } }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.72); backdrop-filter: blur(9px); z-index: 10001; justify-content: center; align-items: center; }
    .modal-box { background: rgba(8,20,40,0.96); border: 1px solid var(--glass-b); border-radius: 22px; padding: 26px; width: 340px; text-align: center; color: white; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.85); }
    .modal-box h3 { color: var(--gold); font-family: var(--fd); font-size: 21px; letter-spacing: 1px; margin-bottom: 5px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
    .modal-actions button { flex: 1; padding: 12px; font-size: 13px; }

    /* LOADER & TOAST */
    @keyframes spin { to { transform: rotate(360deg); } }
    #loaderFloat, #toast { visibility: hidden; opacity: 0; position: fixed; transition: all 0.3s ease; z-index: 10005; }
    #loaderFloat { top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(6,18,34,0.93); backdrop-filter: blur(16px); padding: 22px 32px; border-radius: 18px; border: 1px solid var(--glass-b); display: flex; flex-direction: column; align-items: center; gap: 10px; }
    #loaderFloat.show { visibility: visible; opacity: 1; }
    .spinner { width: 34px; height: 34px; border: 3px solid var(--gold-dim); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.75s linear infinite; }
    #loaderMsg { color: white; font-weight: 700; font-size: 12px; }
    #toast { background: rgba(52,199,89,0.93); color: #fff; padding: 12px 20px; border-radius: 12px; left: 50%; bottom: 80px; transform: translateX(-50%) translateY(16px); font-weight: 700; font-size: 13px; white-space: nowrap; }
    #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: rgba(255,59,48,0.93); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.13); border-radius: 4px; }
  </style>
</head>
<body>

<div id="welcomeScreen">
  <img src="icon.png" class="welcome-logo" alt="Logo MAP">
</div>

<div id="mainView">
  <button id="secretLoginBtn" onclick="cekStatusLogin()" title="Login Admin"></button>

  <div id="header">
    <div class="logo-box" id="boxLogo1"></div>
    <div class="header-info">
      <div id="txtDapur">PORTAL MENU MBG</div>
      <div id="txtMenu">MENU MAKANAN BERGIZI</div>
      <div id="txtTgl">-</div>
    </div>
    <div class="logo-box" id="boxLogo2"></div>
  </div>

  <div id="sideDock">
    <div class="side-tab tab-active" id="tabMenu" onclick="switchView('menu')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>MENU<br>MBG</span>
    </div>
    <div class="side-tab-sep"></div>
    <div class="side-tab" id="tabGaleri" onclick="switchView('galeri')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span>GALERI<br>KEGIATAN</span>
    </div>
  </div>

  <div id="contentArea">
    <button class="nav-arrow" id="navPrev" onclick="prevSlide()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="nav-arrow" id="navNext" onclick="nextSlide()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>

    <div id="imgContainer">
      <img id="displayImg" src="" alt="">
      <button id="btnDownload" onclick="downloadPoster()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Unduh Poster Premium
      </button>
      <div id="emptyState">
        <svg width="68" height="68" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.6; margin-bottom:10px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <div id="emptyPesan">Belum ada data</div>
      </div>
      <div id="gridContainer"></div>
    </div>

    <div id="galeriContainer"></div>
  </div>
</div>

<div id="dock">
  
  <div class="dock-controls" id="slideControls">
    <button class="pill-btn" onclick="prevSlide()" title="Sebelumnya"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
    <button id="btnPlayPause" onclick="runSlide()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" id="iconPlay"><path d="M8 5v14l11-7z"/></svg> <span id="playLabel">PLAY SLIDESHOW</span>
    </button>
    <button class="pill-btn" onclick="nextSlide()" title="Berikutnya"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg></button>
    <span class="slide-counter" id="slideCounter"></span>
  </div>

  <div class="dock-inner">
    <div class="mode-switch">
      <button class="mode-btn active play-active" id="btnModePlayGlobal" onclick="setMode('playglobal')">PLAY HARI INI</button>
      <button class="mode-btn" id="btnModeLihat" onclick="setMode('lihat')">LIHAT DATA</button>
      <button class="mode-btn" id="btnModeKelola" onclick="setMode('kelola')">KELOLA DATA</button>
    </div>

    <div id="dockViewMenu" class="dock-view-section">
      <div class="dock-group">
        <label>Mulai Tanggal</label>
        <input type="date" id="filterMenuStart">
      </div>
      <div class="dock-group">
        <label>Sampai Tanggal</label>
        <input type="date" id="filterMenuEnd">
      </div>
      <div class="dock-group" style="align-self: flex-end;">
        <button class="btn-base" onclick="fetchMenuData()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> CARI</button>
      </div>

      <div class="dock-group kelola-only" style="align-self:flex-end; flex-direction:row; gap:8px; margin-left: 20px; border-left: 1px solid var(--glass-b); padding-left: 20px;">
        <button class="btn-base btn-action" onclick="bukaModalUpMenu()">+ UPLOAD MENU</button>
        <button class="btn-base btn-nav" onclick="bukaModalEdit()">EDIT</button>
        <button class="btn-base btn-danger" onclick="doHapus()">HAPUS</button>
      </div>
    </div>

    <div id="dockViewGaleri" class="dock-view-section" style="display: none;">
      <div class="dock-group">
        <label>Pilih Dapur</label>
        <select id="filterGaleriDapur" style="min-width:160px;">
          <option value="">-- Semua Dapur --</option>
        </select>
      </div>
      <div class="dock-group">
        <label>Pilih Bulan</label>
        <input type="month" id="filterGaleriBulan">
      </div>
      <div class="dock-group" style="align-self: flex-end;">
        <button class="btn-base" onclick="fetchGaleriData()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> CARI</button>
      </div>

      <div class="dock-group kelola-only" style="align-self:flex-end; flex-direction:row; gap:8px; margin-left: 20px; border-left: 1px solid var(--glass-b); padding-left: 20px;">
        <button class="btn-base btn-nav" onclick="bukaModalUpGaleri()">+ UPLOAD GALERI</button>
      </div>
    </div>

  </div>
</div>

<canvas id="posterCanvas" style="display:none;"></canvas>
<div id="loaderFloat"><div class="spinner"></div><div id="loaderMsg">MEMPROSES...</div></div>
<div id="toast">Notifikasi</div>

<div id="modalUpMenu" class="modal-overlay">
  <div class="modal-box">
    <h3>UPLOAD MENU MBG</h3>
    <div id="modalUpMenu" class="modal-overlay">
  <div class="modal-box">
    <h3>UPLOAD MENU MBG</h3>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Pilih Dapur</label>
      <select id="upMenuDapur" style="width:100%;"></select>
    </div>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Tanggal Menu</label>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Tanggal Menu</label>
      <input type="date" id="upMenuTgl" style="width:100%;">
    </div>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Nama Menu</label>
      <input type="text" id="upMenuNama" placeholder="Ketik nama menu..." style="width:100%;">
    </div>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Foto Menu</label>
      <input type="file" id="upMenuFile" accept="image/*" style="width:100%;">
    </div>
    <div class="modal-actions">
      <button class="btn-base btn-secondary" onclick="tutupModal('modalUpMenu')">Batal</button>
      <button class="btn-base btn-action" onclick="executeUploadMenu()">Upload Menu</button>
    </div>
  </div>
</div>

<div id="modalUpGaleri" class="modal-overlay">
  <div class="modal-box">
    <h3>UPLOAD GALERI</h3>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Dapur</label>
      <select id="upGaleriDapur" style="width:100%;"></select>
    </div>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Tanggal Kegiatan</label>
      <input type="date" id="upGaleriTgl" style="width:100%;">
    </div>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Judul Kegiatan</label>
      <input type="text" id="upGaleriJudul" placeholder="Judul singkat..." style="width:100%;">
    </div>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Deskripsi (Opsional)</label>
      <input type="text" id="upGaleriDesc" placeholder="Penjelasan..." style="width:100%;">
    </div>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Foto Kegiatan</label>
      <input type="file" id="upGaleriFile" accept="image/*" style="width:100%;">
    </div>
    <div class="modal-actions">
      <button class="btn-base btn-secondary" onclick="tutupModal('modalUpGaleri')">Batal</button>
      <button class="btn-base btn-nav" onclick="executeUploadGaleri()">Upload Galeri</button>
    </div>
  </div>
</div>

<div id="modalLogin" class="modal-overlay">
  <div class="modal-box">
    <h3>LOGIN ADMIN</h3>
    <input type="password" id="inPassword" placeholder="Masukkan Password" style="text-align:center; font-size:14px; padding:10px; border-radius:8px; border:none;">
    <div class="modal-actions">
      <button class="btn-base btn-secondary" onclick="tutupModal('modalLogin')">Batal</button>
      <button class="btn-base btn-action" onclick="prosesLogin()">Masuk</button>
    </div>
  </div>
</div>
<div id="modalConfirm" class="modal-overlay">
  <div class="modal-box">
    <h3>KONFIRMASI HAPUS</h3>
    <p id="modalText" style="color:#aaa; font-size:14px;">Yakin ingin menghapus data ini?</p>
    <div class="modal-actions">
      <button class="btn-base btn-secondary" onclick="tutupModal('modalConfirm')">Batal</button>
      <button class="btn-base btn-danger" onclick="executeHapus()">Ya, Hapus</button>
    </div>
  </div>
</div>
<div id="modalEdit" class="modal-overlay">
  <div class="modal-box">
    <h3>EDIT MENU</h3>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Nama Menu</label><input type="text" id="editNama" style="width:100%;">
    </div>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Tanggal</label><input type="date" id="editTgl" style="width:100%;">
    </div>
    <div class="dock-group" style="align-items:flex-start; width:100%;">
      <label>Ganti Foto (opsional)</label><input type="file" id="editFile" accept="image/*" style="width:100%;">
    </div>
    <div class="modal-actions">
      <button class="btn-base btn-secondary" onclick="tutupModal('modalEdit')">Batal</button>
      <button class="btn-base btn-action" onclick="executeEdit()">Simpan</button>
    </div>
  </div>
</div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxRbuKbsjDObECrzhB30keDLzQz7k8r6Lg60VhHfnapbiSUnWl2punjq57ZYPCoMT8/exec";

  let isAdmin = false; let imageList = []; let currentIdx = 0; let isPlaying = false;
  let slideTimer, idleTimerBottom, idleTimerSide, dlHideTimer;
  let isGlobalPlayMode = true; let currentView = 'menu';

  const HARI  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  function fmtTgl(str) {
    if(!str || str==='-') return '-';
    try {
      const p = str.split('-');
      const d = (p.length===3 && p[0].length===4) ? new Date(+p[0], +p[1]-1, +p[2]) : new Date(str);
      if(isNaN(d)) return str;
      return `${HARI[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')} ${BULAN[d.getMonth()]} ${d.getFullYear()}`;
    } catch(e) { return str; }
  }
  function fmtHariIni() {
    const d = new Date();
    return `${HARI[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')} ${BULAN[d.getMonth()]} ${d.getFullYear()}`;
  }

  async function fetchAPI(action, payload={}) {
    try {
      const r = await fetch(GAS_API_URL + "?action=" + action, {
        method: 'POST', headers: {'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });
      return await r.json();
    } catch(e) { showToast("Gagal terhubung ke server", true); return null; }
  }

  window.onload = () => {
    setTimeout(() => {
      document.getElementById('welcomeScreen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('mainView').style.display = 'flex';
        setMode('playglobal');
      }, 1000);
    }, 2500);

    fetchAPI('getLogo',{namaFile:'Logo Yayasan.png'}).then(r => { if(r) document.getElementById('boxLogo1').innerHTML = `<img src="${r}" class="logo-img">`; });
    fetchAPI('getLogo',{namaFile:'Logo Badan Gizi.png'}).then(r => { if(r) document.getElementById('boxLogo2').innerHTML = `<img src="${r}" class="logo-img">`; });
    
    // Fetch Dapur untuk Form Galeri
  // Fetch Dapur untuk Form Galeri
    fetchAPI('getDaftarDapur').then(r => {
      let h1 = '<option value="">-- Semua Dapur --</option>';
      let h2 = '<option value="">-- Pilih Dapur --</option>';
      if(r) r.forEach(d => {
        h1 += `<option value="${d.id}">${d.nama}</option>`;
        h2 += `<option value="${d.id}">${d.nama}</option>`;
      });
      document.getElementById('filterGaleriDapur').innerHTML = h1;
      document.getElementById('upGaleriDapur').innerHTML = h2;
      // Tambahkan 1 baris ini agar dropdown Menu Upload juga terisi
      document.getElementById('upMenuDapur').innerHTML = h2; 
    });
    
  function setupSensors() {
    window.addEventListener('mousemove', showDocks);
    window.addEventListener('touchstart', showDocks, {passive:true});
    const dock = document.getElementById('dock');
    const side = document.getElementById('sideDock');
    dock.addEventListener('mouseenter', () => clearTimeout(idleTimerBottom));
    dock.addEventListener('mouseleave', scheduleHideBottom);
    side.addEventListener('mouseenter', () => clearTimeout(idleTimerSide));
    side.addEventListener('mouseleave', scheduleHideSide);

    const ca = document.getElementById('contentArea');
    ca.addEventListener('mousemove', showDl); ca.addEventListener('touchstart', showDl, {passive:true});
    ca.addEventListener('mouseleave', () => { clearTimeout(dlHideTimer); dlHideTimer = setTimeout(()=>document.getElementById('btnDownload').classList.remove('visible'), 900); });
  }

  function showDocks() {
    document.getElementById('dock').classList.add('show-dock');
    document.getElementById('sideDock').classList.add('show-side');
    scheduleHideBottom(); scheduleHideSide();
  }
  function scheduleHideBottom() { clearTimeout(idleTimerBottom); idleTimerBottom = setTimeout(() => document.getElementById('dock').classList.remove('show-dock'), 3000); }
  function scheduleHideSide() { clearTimeout(idleTimerSide); idleTimerSide = setTimeout(() => document.getElementById('sideDock').classList.remove('show-side'), 3000); }
  function showDl() {
    const btn = document.getElementById('btnDownload'); const img = document.getElementById('displayImg');
    if(!img.src || img.style.display==='none') return;
    btn.classList.add('visible'); clearTimeout(dlHideTimer); dlHideTimer = setTimeout(()=>btn.classList.remove('visible'), 2800);
  }

  function showLoader(m) { document.getElementById('loaderMsg').innerText=m; document.getElementById('loaderFloat').classList.add('show'); }
  function hideLoader()  { document.getElementById('loaderFloat').classList.remove('show'); }
  function showToast(m, err=false) {
    const t = document.getElementById('toast'); t.innerText = m;
    err ? t.classList.add('error') : t.classList.remove('error');
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3200);
  }
  function tutupModal(id) { document.getElementById(id).style.display='none'; }
  function updateCounter() { document.getElementById('slideCounter').innerText = imageList.length > 0 ? `${currentIdx+1} / ${imageList.length}` : ''; }

  /* ── NAVIGASI KIRI & DOCK BAWAH ── */
  function switchView(view) {
    currentView = view;
    document.getElementById('tabMenu').classList.toggle('tab-active', view==='menu');
    document.getElementById('tabGaleri').classList.toggle('tab-active', view==='galeri');

    if(view==='galeri') {
      document.getElementById('dockViewMenu').style.display = 'none';
      document.getElementById('dockViewGaleri').style.display = 'flex';
      document.getElementById('imgContainer').style.display  = 'none';
      document.getElementById('slideControls').style.display = 'none';
      document.getElementById('galeriContainer').style.display = 'flex';
      setMode('lihat'); // Galeri gak butuh play global otomatis
      fetchGaleriData();
    } else {
      document.getElementById('dockViewGaleri').style.display = 'none';
      document.getElementById('dockViewMenu').style.display = 'flex';
      document.getElementById('galeriContainer').style.display='none';
      document.getElementById('imgContainer').style.display='flex';
      document.getElementById('slideControls').style.display='flex';
      setMode('playglobal');
    }
  }

  /* ── MODE PENGELOLAAN ── */
  function cekStatusLogin() { if(!isAdmin) document.getElementById('modalLogin').style.display='flex'; else showToast("Anda sudah login."); }
  async function prosesLogin() {
    showLoader("Mengecek..."); const r = await fetchAPI('login',{password:document.getElementById('inPassword').value}); hideLoader();
    if(r && r.success) { isAdmin = true; tutupModal('modalLogin'); showToast("Berhasil Login!"); setMode('kelola'); } 
    else showToast("Password Salah!", true);
  }

  function setMode(mode) {
    if(mode==='kelola' && !isAdmin) return document.getElementById('modalLogin').style.display='flex';
    ['btnModePlayGlobal','btnModeLihat','btnModeKelola'].forEach(id => document.getElementById(id).className = 'mode-btn');
    const kelolaElems = document.querySelectorAll('.kelola-only');

    if(mode==='playglobal') {
      document.getElementById('btnModePlayGlobal').classList.add('active','play-active');
      kelolaElems.forEach(el => el.style.display='none');
      if(currentView === 'menu') jalankanPlaySemua();
    } else if(mode==='lihat') {
      document.getElementById('btnModeLihat').classList.add('active');
      kelolaElems.forEach(el => el.style.display='none');
      isGlobalPlayMode = false;
    } else if(mode==='kelola') {
      document.getElementById('btnModeKelola').classList.add('active');
      kelolaElems.forEach(el => el.style.display='flex');
      isGlobalPlayMode = false;
    }
  }

  /* ── FETCH DATA MENU ── */
  async function jalankanPlaySemua() {
    isGlobalPlayMode = true;
    document.getElementById('txtDapur').innerText = "MEMUAT..."; document.getElementById('txtTgl').innerText = fmtHariIni();
    showLoader("Mengambil Menu Hari Ini...");
    const r = await fetchAPI('getSemuaMenuHariIni'); hideLoader();
    if(r) {
      imageList = r.filter(i => !i.isPlaceholder);
      if(imageList.length > 0) { updateDisplay(0); if(!isPlaying) runSlide(); }
      else { document.getElementById('txtMenu').innerText="BELUM ADA MENU HARI INI"; document.getElementById('displayImg').src=""; document.getElementById('emptyState').style.display = 'flex'; }
    }
    updateCounter();
  }

  async function fetchMenuData() {
    const start = document.getElementById('filterMenuStart').value;
    const end = document.getElementById('filterMenuEnd').value;
    if(!start || !end) return showToast("Pilih Rentang Tanggal!", true);
    
    showLoader("Mencari Data Menu...");
    const r = await fetchAPI('getMenuByDateRange', {startDate: start, endDate: end});
    hideLoader();
    if(r) {
      imageList = r;
      if(imageList.length > 0) { document.getElementById('emptyState').style.display = 'none'; updateDisplay(0); }
      else { document.getElementById('txtMenu').innerText="TIDAK DITEMUKAN"; document.getElementById('displayImg').src=""; document.getElementById('emptyState').style.display='flex'; }
    }
    updateCounter();
  }

  function updateDisplay(idx) {
    if(!imageList[idx]) return;
    const img = document.getElementById('displayImg'); const data = imageList[idx];
    document.getElementById('txtDapur').innerText = data.dapur || "SEMUA DAPUR";
    document.getElementById('emptyState').style.display = 'none';
    img.style.display = 'block'; img.src = data.src;
    document.getElementById('txtMenu').innerText = data.nama;
    document.getElementById('txtTgl').innerText  = fmtTgl(data.tanggal);
    currentIdx = idx; updateCounter();
  }

  /* ── GALERI ── */
  async function fetchGaleriData() {
    document.getElementById('txtDapur').innerText = "GALERI KEGIATAN";
    document.getElementById('txtMenu').innerText  = "MEMUAT DATA...";
    showLoader("Memuat Galeri...");
    
    const dEl = document.getElementById('filterGaleriDapur');
    const namaDapur = dEl.options[dEl.selectedIndex].text;
    const isSemua = !dEl.value;
    const bulan = document.getElementById('filterGaleriBulan').value; // format YYYY-MM

    const r = await fetchAPI('getGaleriByFilter', { dapur: isSemua ? "Semua" : namaDapur, bulan: bulan });
    hideLoader();
    
    document.getElementById('txtMenu').innerText = isSemua ? "Semua Dapur" : namaDapur;

    let html = '';
    if(r && r.length > 0) {
      r.forEach(g => {
        html += `<div class="galeri-card">
          <img src="${g.src}" loading="lazy">
          <div class="galeri-title">${g.judul}</div>
          <div class="galeri-desc">${g.deskripsi||''}</div>
          <div class="meta-item"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${fmtTgl(g.tanggal)}</div>
          <div class="meta-item" style="margin-top:3px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${g.dapur||'Umum'}</div>
        </div>`;
      });
    } else {
      html = `<div style="color:#666;font-style:italic;margin:auto;padding:40px;">Belum ada kegiatan pada filter tersebut.</div>`;
    }
    document.getElementById('galeriContainer').innerHTML = html;
  }

  /* ── UPLOAD SYSTEM ── */
  function bukaModalUpMenu() { document.getElementById('modalUpMenu').style.display = 'flex'; }
  function bukaModalUpGaleri() { document.getElementById('modalUpGaleri').style.display = 'flex'; }

function executeUploadMenu() {
    const dEl = document.getElementById('upMenuDapur');
    if(!dEl.value) return showToast("Pilih Dapur!", true);
    
    const tgl = document.getElementById('upMenuTgl').value;
    const nama = document.getElementById('upMenuNama').value.trim();
    const file = document.getElementById('upMenuFile').files[0];
    if(!tgl) return showToast("Pilih Tanggal!", true);
    if(!nama) return showToast("Isi Nama Menu!", true);
    if(!file) return showToast("Pilih Foto!", true);

    const rd = new FileReader();
    rd.onload = async e => {
      showLoader("MENGUPLOAD MENU...");
      // Kirim parameter dapurId ke backend API
      const r = await fetchAPI('uploadMenuAutoFolder', { dapurId: dEl.value, namaMenu: nama, tanggal: tgl, data: e.target.result });
      hideLoader();
      if(r && r.status === 'sukses') {
        showToast("Menu berhasil diupload!"); tutupModal('modalUpMenu');
        document.getElementById('upMenuFile').value=''; document.getElementById('upMenuNama').value='';
      } else showToast("Gagal upload menu", true);
    };
    rd.readAsDataURL(file);
  }

  function executeUploadGaleri() {
    const dEl = document.getElementById('upGaleriDapur');
    if(!dEl.value) return showToast("Pilih Dapur!", true);
    const dapurNama = dEl.options[dEl.selectedIndex].text;
    const tgl = document.getElementById('upGaleriTgl').value;
    const judul = document.getElementById('upGaleriJudul').value.trim();
    const desc = document.getElementById('upGaleriDesc').value.trim();
    const file = document.getElementById('upGaleriFile').files[0];
    
    if(!tgl) return showToast("Pilih Tanggal!", true);
    if(!judul) return showToast("Isi Judul Kegiatan!", true);
    if(!file) return showToast("Pilih Foto!", true);

    const rd = new FileReader();
    rd.onload = async e => {
      showLoader("MENGUPLOAD GALERI...");
      const r = await fetchAPI('uploadGaleri', { dapur: dapurNama, tanggal: tgl, judul, deskripsi: desc, data: e.target.result });
      hideLoader();
      if(r && r.status === 'sukses') {
        showToast("Galeri berhasil diupload!"); tutupModal('modalUpGaleri');
        document.getElementById('upGaleriFile').value=''; document.getElementById('upGaleriJudul').value='';
      } else showToast("Gagal upload galeri", true);
    };
    rd.readAsDataURL(file);
  }

  /* ── PLAYBACK ── */
  function runSlide() {
    isPlaying = !isPlaying;
    const btn = document.getElementById('btnPlayPause'); const icon = document.getElementById('iconPlay'); const label = document.getElementById('playLabel');
    if(isPlaying) {
      btn.classList.add('playing'); icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; label.innerText = 'PAUSE';
      slideTimer = setInterval(() => nextSlide(), 5000);
    } else {
      btn.classList.remove('playing'); icon.innerHTML = '<path d="M8 5v14l11-7z"/>'; label.innerText = 'PLAY SLIDESHOW';
      clearInterval(slideTimer);
    }
  }
  function nextSlide() { if(imageList.length>0) updateDisplay(currentIdx===imageList.length-1 ? 0 : currentIdx+1); }
  function prevSlide() { if(imageList.length>0) updateDisplay(currentIdx===0 ? imageList.length-1 : currentIdx-1); }
</script>
</body>
</html>
